<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <!-- Background -->
  <rect width="128" height="128" rx="16" fill="#1a1a2e"/>
  <!-- Building outline -->
  <rect x="20" y="30" width="88" height="75" rx="4" fill="none" stroke="#4a9eff" stroke-width="4"/>
  <!-- Windows -->
  <rect x="30" y="45" width="20" height="15" rx="2" fill="#4a9eff" opacity="0.7"/>
  <rect x="58" y="45" width="20" height="15" rx="2" fill="#4a9eff" opacity="0.7"/>
  <rect x="78" y="45" width="20" height="15" rx="2" fill="#ffd700" opacity="0.9"/>
  <rect x="30" y="68" width="20" height="15" rx="2" fill="#4a9eff" opacity="0.7"/>
  <rect x="58" y="68" width="20" height="15" rx="2" fill="#ff4444" opacity="0.9"/>
  <rect x="78" y="68" width="20" height="15" rx="2" fill="#4a9eff" opacity="0.7"/>
  <!-- Door -->
  <rect x="52" y="88" width="24" height="17" rx="2" fill="#2a4a7f"/>
  <!-- Roof line -->
