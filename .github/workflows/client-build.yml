name: Build & Deploy Web Client

on:
  push:
    branches: [main]
    paths:
      - 'client/**'
      - '.github/workflows/client-build.yml'
  workflow_dispatch:

jobs:
  build-web:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.2
    steps:
      - uses: actions/checkout@v4

      - name: Setup export templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.2.stable
          mv /root/.local/share/godot/export_templates/4.2.stable/* \
             ~/.local/share/godot/export_templates/4.2.stable/

      - name: Export Web build
        working-directory: client
        run: |
          mkdir -p build/web
          godot --headless --export-release "Web" build/web/index.html 2>&1 || true
          ls -la build/web/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: client/build/web/

      - name: Deploy to game server
        env:
          DEPLOY_PASSWORD: ${{ secrets.DEPLOY_PASSWORD }}
        run: |
          apt-get update -qq && apt-get install -y -qq sshpass rsync
          sshpass -p "$DEPLOY_PASSWORD" rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=no" \
            client/build/web/ \
            root@104.64.211.27:/var/www/html/game/
          # 确保 download-server 容器也能服务此目录
          sshpass -p "$DEPLOY_PASSWORD" ssh -o StrictHostKeyChecking=no \
            root@104.64.211.27 "
              docker exec download-server nginx -s reload 2>/dev/null || true
              echo 'Deploy OK'
            "
