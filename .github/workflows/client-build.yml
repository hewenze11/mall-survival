name: Client Build

on:
  push:
    branches: [main]
    paths:
      - 'client/**'

jobs:
  build-windows:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.2
    steps:
      - uses: actions/checkout@v4

      - name: Setup export templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.2.stable
          mv /root/.local/share/godot/export_templates/4.2.stable/* ~/.local/share/godot/export_templates/4.2.stable/ 2>/dev/null || true

      - name: Export Windows
        run: |
          mkdir -p build/windows
          cd client
          godot --headless --export-release "Windows Desktop" ../build/windows/MallSurvival.exe

      - name: Export Linux
        run: |
          mkdir -p build/linux
          cd client
          godot --headless --export-release "Linux/X11" ../build/linux/MallSurvival.x86_64

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: MallSurvival-Windows-${{ github.sha }}
          path: build/windows/

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: MallSurvival-Linux-${{ github.sha }}
          path: build/linux/
