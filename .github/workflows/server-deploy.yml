name: Server Deploy

on:
  push:
    branches: [main]
    paths:
      - 'server/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          cd server
          docker build -t 104.64.211.27:5000/mall-survival-server:latest .
          docker build -t 104.64.211.27:5000/mall-survival-server:${{ github.sha }} .

      - name: Push to private registry
        run: |
          echo '{ "insecure-registries": ["104.64.211.27:5000"] }' | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker
          docker push 104.64.211.27:5000/mall-survival-server:latest
          docker push 104.64.211.27:5000/mall-survival-server:${{ github.sha }}

      - name: Deploy to game server (ip1)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 104.64.211.23
          username: root
          password: WenZhiHong!@#456
          script: |
            cd /opt/game
            docker pull 104.64.211.27:5000/mall-survival-server:latest
            docker-compose -f docker-compose.game.yml up -d --force-recreate
            docker image prune -f
