name: Deploy Server

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'config/**'
      - 'Dockerfile'
      - '.github/workflows/server-deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build server
        working-directory: server
        run: |
          npm ci
          npx tsc
          echo "Build OK"

      - name: Deploy to ip1
        env:
          DEPLOY_PASSWORD: ${{ secrets.DEPLOY_PASSWORD }}
        run: |
          apt-get install -y sshpass 2>/dev/null | tail -1
          sshpass -p "$DEPLOY_PASSWORD" ssh -o StrictHostKeyChecking=no root@104.64.211.23 "
            cd /tmp/mall-survival && git pull
            cd server && npm ci && ./node_modules/.bin/tsc
            cd /tmp/mall-survival
            docker build -f Dockerfile -t 104.64.211.27:5000/mall-survival-server:latest .
            docker push 104.64.211.27:5000/mall-survival-server:latest
            cd /opt/game && docker compose down && docker compose up -d
            sleep 5 && curl -s http://localhost:2567/health
          "
